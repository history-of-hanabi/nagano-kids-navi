const ROW_ORDER = ["あ行","か行","さ行","た行","な行","は行","ま行","や行","ら行","その他"];

function getKanaRow(str){
  const c=str.charAt(0);
  if("あいうえおアイウエオ".includes(c))return"あ行";
  if("かきくけこがぎぐげごカキクケコガギグゲゴ".includes(c))return"か行";
  if("さしすせそざじずぜぞサシスセソザジズゼゾ".includes(c))return"さ行";
  if("たちつてとだぢづでどタチツテトダヂヅデド".includes(c))return"た行";
  if("なにぬねのナニヌネノ".includes(c))return"な行";
  if("はひふへほばびぶべぼぱぴぷぺぽハヒフヘホバビブベボパピプペポ".includes(c))return"は行";
  if("まみむめもマミムメモ".includes(c))return"ま行";
  if("やゆよヤユヨ".includes(c))return"や行";
  if("らりるれろラリルレロ".includes(c))return"ら行";
  return"その他";
}

function buildAreaByRow(items){
  const areas=[...new Set(items.map(d=>d.area).filter(Boolean))].sort();
  const g={};
  areas.forEach(a=>{const r=getKanaRow(a);if(!g[r])g[r]=[];g[r].push(a);});
  return g;
}

function parseCSV(text){
  const rows=[];let row=[],field='',inQ=false;
  const str=text.charCodeAt(0)===0xFEFF?text.slice(1):text;
  for(let i=0;i<str.length;i++){
    const ch=str[i];
    if(inQ){if(ch==='"'){if(str[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=ch;}
    else if(ch==='"')inQ=true;
    else if(ch===','){row.push(field.trim());field='';}
    else if(ch==='\n'||ch==='\r'){row.push(field.trim());if(row.some(c=>c!==''))rows.push(row);row=[];field='';if(ch==='\r'&&str[i+1]==='\n')i++;}
    else field+=ch;
  }
  row.push(field.trim());if(row.some(c=>c!==''))rows.push(row);return rows;
}

function csvToItems(rows){
  if(rows.length<2)return[];
  const headers=rows[0].map(h=>h.toLowerCase().trim());
  return rows.slice(1).map(cols=>{
    const obj={};headers.forEach((h,i)=>{obj[h]=cols[i]??'';});
    return{name:obj.name||'',area:obj.area||'',grade:obj.grade||'',trial:obj.trial||'',parking:obj.parking||''};
  }).filter(o=>o.name);
}

function countMatches(items,filters){
  return items.filter(d=>{
    if(filters.grade&&!d.grade.includes(filters.grade))return false;
    if(filters.area&&d.area!==filters.area)return false;
    if(filters.trial==="1"&&d.trial!=="あり")return false;
    if(filters.parking==="1"&&d.parking!=="あり")return false;
    return true;
  }).length;
}

function diagnose(answers){
  const filters={};let jukuType="",message="";const points=[];
  if(answers.grade)filters.grade=answers.grade;
  if(answers.area)filters.area=answers.area;
  if(answers.style==="individual"){jukuType="個別指導塾";points.push("お子さんのペースに合わせた完全個別指導");}
  else if(answers.style==="small"){jukuType="少人数・集団塾";points.push("仲間と刺激し合える環境");}
  else{jukuType="個別指導塾";points.push("まず体験授業で雰囲気を確認できる");filters.trial="1";}
  if(answers.concern==="basic"){points.push("基礎から丁寧に指導してくれる教室");message="基礎固めには、お子さんのつまずきを見つけて一つずつ解決してくれる個別指導が特に効果的です。";}
  else if(answers.concern==="exam"){points.push("受験対策カリキュラムが充実した教室");message="受験対策は早めのスタートが鍵。志望校に合わせたカリキュラムで計画的に進められる塾を選びましょう。";}
  else if(answers.concern==="habit"){points.push("自習室・学習管理が充実した教室");message="勉強習慣は環境が大切。自習室が使える塾や、学習スケジュールを一緒に管理してくれる塾がおすすめです。";}
  else{points.push("レベルに合わせた応用カリキュラム");message="得意を伸ばすには、上のレベルに挑戦できる環境が重要です。実力に合わせた指導をしてくれる塾を探しましょう。";}
  if(answers.priority==="parking"){filters.parking="1";points.push("駐車場完備で送迎もラクラク");}
  else if(answers.priority==="trial"){filters.trial="1";points.push("体験授業で安心してスタートできる");}
  if(answers.area)points.push(`エリア：${answers.area.replace("周辺","")}`);
  return{filters,jukuType,message,points};
}

function buildURL(filters){
  const p=new URLSearchParams();
  Object.entries(filters).forEach(([k,v])=>{if(v)p.set(k,v);});
  const s=p.toString();return s?`${SITE_URL}#/?${s}`:SITE_URL;
}
function buildURLNoArea(filters){const{area,...rest}=filters;return buildURL(rest);}

function AreaStep({value,onChange,areaByRow}){

          <span style={{fontSize:14,color:"#F97316",fontWeight:"bold",flex:1}}>📍 {value.replace("周辺","")}</span>
          <button onClick={()=>{onChange("");setSelRow("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#AAA",fontSize:18,lineHeight:1,padding:"0 4px"}}>×</button>
        </div>
      )}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
        {rows.map(row=>(
          <button key={row} onClick={()=>setSelRow(r=>r===row?"":row)} style={{padding:"8px 14px",borderRadius:20,fontFamily:"inherit",border:`2px solid ${selRow===row?"#F97316":"#EDE9E0"}`,background:selRow===row?"#FFF7ED":"white",color:selRow===row?"#F97316":"#888",fontWeight:selRow===row?"bold":"normal",fontSize:14,cursor:"pointer"}}>{row}</button>
        ))}
      </div>
      {selRow&&areaByRow[selRow]&&(
        <div style={{background:"white",borderRadius:12,border:"1.5px solid #EDE9E0",overflow:"hidden",marginBottom:4}}>
          {areaByRow[selRow].map((area,i)=>(
            <button key={area} onClick={()=>{onChange(area);setSelRow("");}} style={{display:"block",width:"100%",padding:"12px 16px",textAlign:"left",fontFamily:"inherit",fontSize:14,border:"none",borderBottom:i<areaByRow[selRow].length-1?"1px solid #EDE9E0":"none",background:value===area?"#FFF7ED":"white",color:value===area?"#F97316":"#444",fontWeight:value===area?"bold":"normal",cursor:"pointer"}}>
              {value===area?"✅ ":""}{area.replace("周辺","")}
            </button>
          ))}
        </div>
      )}
      {!value&&<p style={{fontSize:12,color:"#BBB",textAlign:"center",marginTop:8}}>エリアを選ばずに進むこともできます</p>}
    </div>
  );
}

    fetch(SPREADSHEET_URL).then(r=>r.text()).then(text=>{
      const parsed=csvToItems(parseCSV(text));
      if(parsed.length>0)setItems(parsed);
    }).catch(()=>{});
  },[]);

  const isArea=step===QUESTIONS.length+1;
  const isResult=step===TOTAL+1;
  const currentQ=(!isArea&&!isResult&&step>=1)?QUESTIONS[step-1]:null;
  const result=isResult?diagnose(answers):null;
  const matchCount=result?countMatches(items,result.filters):null;
  const matchCountNoArea=result?.filters.area?countMatches(items,{...result.filters,area:undefined}):null;

  const handleBack=()=>{
    if(step===0)return;
    const prev=step-1;
    setStep(prev);
    setSelected(null);
    if(prev>=1&&prev<=QUESTIONS.length){
      const pq=QUESTIONS[prev-1];
      setSelected(answers[pq.id]??null);
    }
  };

  const handleNext=()=>{
    if(selected===null)return;
    setAnswers(prev=>({...prev,[currentQ.id]:selected}));
    setSelected(null);setStep(s=>s+1);
  };

  const handleAreaNext=()=>{
    setAnswers(prev=>({...prev,area:selArea}));
    setStep(s=>s+1);
  };

  const reset=()=>{setStep(0);setAnswers({});setSelected(null);setSelArea("");};

  const wrap=(children)=>(
    <div style={{fontFamily:"'Noto Sans JP','Hiragino Sans',sans-serif",maxWidth:480,margin:"0 auto",padding:16,background:"#FFF7ED",minHeight:"100vh"}}>
      {children}
    </div>
  );

  // トップ
  if(step===0)return wrap(
    <div style={{display:"flex",flexDirection:"column",justifyContent:"center",minHeight:"100vh",paddingBottom:32}}>
      <div style={{background:"linear-gradient(135deg,#F97316,#FBBF24)",borderRadius:20,padding:"32px 20px",textAlign:"center",marginBottom:24,boxShadow:"0 8px 32px rgba(249,115,22,0.25)"}}>
        <div style={{fontSize:48,marginBottom:12}}>🎯</div>
        <div style={{fontSize:20,fontWeight:"bold",color:"white",marginBottom:8}}>塾タイプ診断</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.9)",lineHeight:1.7}}>5つの質問に答えるだけで<br/>お子さんに合う塾が見つかります</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
        {[{emoji:"⏱️",text:"所要時間：約1分"},{emoji:"🆓",text:"無料・登録不要"},{emoji:"📍",text:"エリア指定で近くの塾を絞り込めます"}].map((item,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"white",borderRadius:10,padding:"10px 14px",border:"1.5px solid #EDE9E0",fontSize:13,color:"#555"}}>
            <span style={{fontSize:18}}>{item.emoji}</span>{item.text}
          </div>
        ))}
      </div>
      <button onClick={()=>setStep(1)} style={{width:"100%",padding:"16px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#F97316,#FBBF24)",color:"white",fontSize:17,fontWeight:"bold",fontFamily:"inherit",cursor:"pointer",boxShadow:"0 4px 14px rgba(249,115,22,0.4)"}}>
        診断スタート →
      </button>
    </div>
  );

  // 通常質問
  if(currentQ)return wrap(
    <>
      <Header step={step} total={TOTAL} onBack={handleBack}/>
      <div style={{background:"white",borderRadius:16,padding:"20px 16px",border:"1.5px solid #EDE9E0",marginBottom:16}}>
        <div style={{fontSize:28,marginBottom:8}}>{currentQ.emoji}</div>
        <div style={{fontSize:16,fontWeight:"bold",color:"#1A1A2E",lineHeight:1.5}}>{currentQ.question}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {currentQ.options.map((opt,i)=>(
          <button key={i} onClick={()=>setSelected(opt.value)} style={{padding:"14px 16px",borderRadius:12,fontFamily:"inherit",border:`2px solid ${selected===opt.value?"#F97316":"#EDE9E0"}`,background:selected===opt.value?"#FFF7ED":"white",textAlign:"left",cursor:"pointer",transition:"all 0.15s"}}>
            <div style={{fontSize:14,fontWeight:"bold",color:selected===opt.value?"#F97316":"#333"}}>{selected===opt.value?"✅ ":""}{opt.label}</div>
            <div style={{fontSize:12,color:"#AAA",marginTop:3}}>{opt.sub}</div>
          </button>
        ))}
      </div>
      <button onClick={handleNext} disabled={selected===null} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:selected!==null?"linear-gradient(135deg,#F97316,#FBBF24)":"#DDD",color:"white",fontSize:15,fontWeight:"bold",fontFamily:"inherit",cursor:selected!==null?"pointer":"not-allowed"}}>次へ →</button>
    </>
  );

  // エリア選択
  if(isArea)return wrap(
    <>
      <Header step={step} total={TOTAL} onBack={handleBack}/>
      <div style={{background:"white",borderRadius:16,padding:"20px 16px",border:"1.5px solid #EDE9E0",marginBottom:16}}>
        <div style={{fontSize:28,marginBottom:8}}>📍</div>
        <div style={{fontSize:16,fontWeight:"bold",color:"#1A1A2E",lineHeight:1.5}}>通いやすいエリアはありますか？</div>
        <div style={{fontSize:12,color:"#AAA",marginTop:6}}>選ばなくても診断結果を見られます</div>
      </div>
      <div style={{marginBottom:20}}>
        <AreaStep value={selArea} onChange={setSelArea} areaByRow={areaByRow}/>
      </div>
      <button onClick={handleAreaNext} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#F97316,#FBBF24)",color:"white",fontSize:15,fontWeight:"bold",fontFamily:"inherit",cursor:"pointer",boxShadow:"0 4px 14px rgba(249,115,22,0.35)"}}>
        {selArea?"診断結果を見る 🎯":"エリア指定なしで結果を見る →"}
      </button>
    </>
  );

  // 結果
  if(isResult&&result)return wrap(
    <>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={handleBack} style={{display:"flex",alignItems:"center",justifyContent:"center",width:36,height:36,borderRadius:"50%",border:"2px solid #EDE9E0",background:"white",cursor:"pointer",flexShrink:0,fontSize:16,fontFamily:"inherit"}}>←</button>
        <span style={{fontSize:14,fontWeight:"bold",color:"#555"}}>診断結果</span>
      </div>
      <div style={{background:"linear-gradient(135deg,#F97316,#FBBF24)",borderRadius:16,padding:"24px 16px",textAlign:"center",marginBottom:16,boxShadow:"0 4px 20px rgba(249,115,22,0.3)"}}>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.85)",marginBottom:6}}>診断結果</div>
        <div style={{fontSize:26,fontWeight:"bold",color:"white",marginBottom:4}}>🏫 {result.jukuType}</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.85)"}}>が向いています</div>
      </div>
      <div style={{background:"white",borderRadius:14,padding:16,border:"1.5px solid #EDE9E0",marginBottom:12,lineHeight:1.8,fontSize:14,color:"#444"}}>
        <div style={{fontSize:13,color:"#F97316",fontWeight:"bold",marginBottom:8}}>💡 アドバイス</div>
        {result.message}
      </div>
      <div style={{background:"white",borderRadius:14,padding:16,border:"1.5px solid #EDE9E0",marginBottom:12}}>
        <div style={{fontSize:13,color:"#1a6b3c",fontWeight:"bold",marginBottom:10}}>✅ あなたの条件に合ったポイント</div>
        {result.points.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:13,color:"#555",marginBottom:8,lineHeight:1.5}}>
            <span style={{color:"#F97316",flexShrink:0,fontWeight:"bold"}}>•</span>{p}
          </div>
        ))}
      </div>
      <div style={{background:"white",borderRadius:14,padding:16,border:"2px solid #F97316",marginBottom:12}}>
        <div style={{fontSize:13,color:"#F97316",fontWeight:"bold",marginBottom:12}}>🔍 条件に合う長野市の塾を見る</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:12,color:"#888"}}>該当件数</span>
          <CountBadge count={matchCount}/>
        </div>
        <a href={buildURL(result.filters)} target="_blank" rel="noopener noreferrer"
          style={{display:"block",padding:"13px",background:matchCount===0?"#DDD":"linear-gradient(135deg,#F97316,#FBBF24)",color:"white",borderRadius:12,textAlign:"center",textDecoration:"none",fontSize:15,fontWeight:"bold",boxShadow:matchCount===0?"none":"0 4px 14px rgba(249,115,22,0.35)"}}>
          {matchCount===0?"条件に合う塾がありません":"該当する塾の一覧を見る →"}
        </a>
        {result.filters.area&&(
          <div style={{marginTop:12}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:12,color:"#888"}}>エリアを外した場合</span>
              <CountBadge count={matchCountNoArea}/>
            </div>
            <a href={buildURLNoArea(result.filters)} target="_blank" rel="noopener noreferrer"
              style={{display:"block",padding:"11px",background:"white",border:"2px solid #FDBA74",color:"#F97316",borderRadius:12,textAlign:"center",textDecoration:"none",fontSize:13,fontWeight:"bold"}}>
              📍 エリアを外して再検索する
            </a>
          </div>
        )}
      </div>
      <button onClick={reset} style={{width:"100%",padding:"13px",borderRadius:12,border:"2px solid #EDE9E0",background:"white",fontSize:14,fontWeight:"bold",color:"#888",cursor:"pointer",fontFamily:"inherit"}}>
        🔄 もう一度診断する
      </button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
