function parseCSV(text) {
  const rows=[];let row=[],field='',inQuotes=false,i=0;
  const str=text.charCodeAt(0)===0xFEFF?text.slice(1):text;
  while(i<str.length){
    const ch=str[i];
    if(inQuotes){if(ch==='"'){if(str[i+1]==='"'){field+='"';i+=2;continue;}inQuotes=false;}else{field+=ch;}}
    else{if(ch==='"'){inQuotes=true;}else if(ch===','){row.push(field.trim());field='';}
    else if(ch==='\n'||ch==='\r'){row.push(field.trim());if(row.some(c=>c!==''))rows.push(row);row=[];field='';if(ch==='\r'&&str[i+1]==='\n')i++;}
    else{field+=ch;}}i++;
  }
  row.push(field.trim());if(row.some(c=>c!==''))rows.push(row);return rows;
}

function csvToItems(rows){
  if(rows.length<2)return[];
  const headers=rows[0].map(h=>h.toLowerCase().trim());
  return rows.slice(1).map(cols=>{
    const obj={};headers.forEach((h,i)=>{obj[h]=cols[i]??'';});
    return{no:obj['no']||'',name:obj['name']||'',slug:obj['slug']||obj['no']||'',area:obj['area']||'',grade:obj['grade']||'',price:obj['price']||'',parking:obj['parking']||'',type:obj['type']||'',url:obj['url']||'',memo:obj['memo']||'',trial:obj['trial']||'',access:obj['access']||'',featured:obj['featured']?.toLowerCase()==='true'};
  }).filter(o=>o.name);
}
