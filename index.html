function parseCSV(text){
  const rows=[];let row=[],field='',inQuotes=false,i=0;
  const str=text.charCodeAt(0)===0xFEFF?text.slice(1):text;
  while(i<str.length){
    const ch=str[i];
    if(inQuotes){if(ch==='"'){if(str[i+1]==='"'){field+='"';i+=2;continue;}inQuotes=false;}else{field+=ch;}}
    else{if(ch==='"'){inQuotes=true;}else if(ch===','){row.push(field.trim());field='';}
    else if(ch==='\n'||ch==='\r'){row.push(field.trim());if(row.some(c=>c!==''))rows.push(row);row=[];field='';if(ch==='\r'&&str[i+1]==='\n')i++;}
    else{field+=ch;}}i++;
  }
  row.push(field.trim());if(row.some(c=>c!==''))rows.push(row);return rows;
}

function csvToItems(rows){
  if(rows.length<2)return[];
  const headers=rows[0].map(h=>h.toLowerCase().trim());
  return rows.slice(1).map(cols=>{
    const obj={};headers.forEach((h,i)=>{obj[h]=cols[i]??'';});
    return{no:obj['no']||'',name:obj['name']||'',slug:obj['slug']||obj['no']||'',area:obj['area']||'',grade:obj['grade']||'',price:obj['price']||'',parking:obj['parking']||'',type:obj['type']||'',url:obj['url']||'',memo:obj['memo']||'',trial:obj['trial']||'',access:obj['access']||'',featured:obj['featured']?.toLowerCase()==='true'};
  }).filter(o=>o.name);
}

          <p style={{fontSize:13,color:'#555',lineHeight:1.75}}>「地域の教室情報をまとめて比較できるサイトが少ない」という不便さを感じたことが、このサイトを作ったきっかけです。</p>
        </div>
        <div style={{background:'#fff',borderRadius:16,border:'1.5px solid #EDE9E0',padding:'18px 16px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><span style={{fontSize:20}}>📅</span><h2 style={{fontSize:15,fontWeight:900,color:'#1A1A2E'}}>今後の予定</h2></div>
          <p style={{fontSize:13,color:'#555',lineHeight:1.75,marginBottom:10}}>現在は長野市の学習塾情報を中心に掲載していますが、今後はピアノ教室・英会話・ダンス教室など、子ども向けの習い事情報も順次追加予定です。</p>
          <p style={{fontSize:13,color:'#555',lineHeight:1.75}}>保護者の方が「自分の子どもに合う教室」を見つけやすくなることを目指しています。</p>
        </div>
        <div style={{background:'#fff',borderRadius:16,border:'1.5px solid #EDE9E0',padding:'18px 16px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}><span style={{fontSize:20}}>✨</span><h2 style={{fontSize:15,fontWeight:900,color:'#1A1A2E'}}>サイトの特徴</h2></div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {features.map((f,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',background:'#FFF7ED',borderRadius:10,border:'1px solid #FDE68A'}}>
                <span style={{color:'#F97316',fontWeight:900,flexShrink:0}}>✓</span>
                <span style={{fontSize:13,color:'#555',lineHeight:1.5}}>{f}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:'linear-gradient(135deg,#FFF7ED,#FFFBF0)',borderRadius:16,border:'2px solid #FBBF24',padding:'18px 16px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><span style={{fontSize:20}}>📋</span><h2 style={{fontSize:15,fontWeight:900,color:'#1A1A2E'}}>掲載について</h2></div>
          <p style={{fontSize:13,color:'#555',lineHeight:1.75,marginBottom:12}}>掲載は無料です。情報の修正や掲載希望がある教室の方は、掲載希望フォームよりご連絡ください。</p>
          <CtaButton full={true}/>
        </div>
        <button onClick={()=>onNav('home')} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'13px',background:'#fff',border:'2px solid #FDBA74',borderRadius:12,fontSize:14,fontWeight:800,color:'#F97316',cursor:'pointer',fontFamily:'inherit',width:'100%'}}>
          ← 塾一覧に戻る
        </button>
      </main>
      <SiteFooter onNav={onNav}/>
    </div>
  );
}

// ─── トップページ ─────────────────────────────────────────
function HomePage({onNav, filters, setFilters}){
  const {searchTerm,filterArea,filterGrade,filterTrial,filterParking} = filters;
  const setSearchTerm  = v => setFilters(f=>({...f,searchTerm:  typeof v==='function'?v(f.searchTerm):v}));
  const setFilterArea  = v => setFilters(f=>({...f,filterArea:  typeof v==='function'?v(f.filterArea):v}));
  const setFilterGrade = v => setFilters(f=>({...f,filterGrade: typeof v==='function'?v(f.filterGrade):v}));
  const setFilterTrial = v => setFilters(f=>({...f,filterTrial: typeof v==='function'?v(f.filterTrial):v}));
  const setFilterParking=v => setFilters(f=>({...f,filterParking:typeof v==='function'?v(f.filterParking):v}));

  const [items,setItems]=useState(FALLBACK);
  const [loading,setLoading]=useState(true);
  const [csvError,setCsvError]=useState(false);
  const [modalOpen,setModalOpen]=useState(false);

  useEffect(()=>{
    document.title='長野市キッズナビ｜長野市の学習塾・個別指導塾を検索・比較';
    const ctrl=new AbortController();
    fetch(SPREADSHEET_URL,{signal:ctrl.signal})
      .then(r=>{if(!r.ok)throw new Error();return r.text();})
      .then(text=>{const parsed=csvToItems(parseCSV(text));if(parsed.length>0)setItems(parsed);else setCsvError(true);setLoading(false);})
      .catch(err=>{if(err.name==='AbortError')return;setCsvError(true);setLoading(false);});
    return()=>ctrl.abort();
  },[]);

  const areas=[...new Set(items.map(d=>d.area).filter(Boolean))].sort();
  const activeCount=[filterArea,filterGrade,filterTrial?'t':'',filterParking?'p':''].filter(Boolean).length;
  const filtered=useMemo(()=>items.filter(d=>{
    if(searchTerm&&!d.name.includes(searchTerm)&&!d.area.includes(searchTerm)&&!d.memo.includes(searchTerm))return false;
    if(filterArea&&d.area!==filterArea)return false;
    if(filterGrade&&!d.grade.includes(filterGrade))return false;
    if(filterTrial&&d.trial!=='あり')return false;
    if(filterParking&&d.parking!=='あり')return false;
    return true;
  }).sort((a,b)=>(b.featured?1:0)-(a.featured?1:0)),[items,searchTerm,filterArea,filterGrade,filterTrial,filterParking]);
  const reset=()=>setFilters({searchTerm:'',filterArea:'',filterGrade:'',filterTrial:false,filterParking:false});

  if(loading)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:'#FFF7ED',gap:16}}>
      <div style={{width:52,height:52,borderRadius:14,background:'linear-gradient(135deg,#F97316,#FBBF24)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26}}>🎒</div>
      <div style={{color:'#F97316',fontWeight:700,fontSize:15}}>読み込み中…</div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:'#FFF7ED',paddingBottom:96}}>
      <SiteHeader onNav={onNav} showStats={true} items={items} areas={areas}/>
      {csvError&&<div style={{background:'#FFF7ED',borderBottom:'1px solid #FDBA74',padding:'7px 16px',fontSize:12,color:'#92400E',textAlign:'center'}}>⚠️ サンプルデータを表示中</div>}

      {/* ファーストビュー直下CTA */}
      <div style={{padding:'14px 14px 0'}}>
        <a href={FORM_URL} target="_blank" rel="noopener noreferrer" className="cta-btn"
          onClick={()=>window.gtag&&window.gtag('event','cta_click',{location:'firstview'})}>
          📋 教室を無料掲載する
        </a>
      </div>

      {/* 検索バー */}
      <div style={{padding:'12px 14px 6px'}}>
        <div style={{background:'#fff',borderRadius:99,boxShadow:'0 2px 10px rgba(0,0,0,0.07)',display:'flex',alignItems:'center',padding:'10px 16px',border:'1.5px solid #FDE68A',gap:8}}>
          <span style={{fontSize:18,color:'#F97316'}}>🔍</span>
          <input type="text" placeholder="エリア・塾名・キーワードで探す…"
            style={{flex:1,border:'none',outline:'none',fontSize:14,background:'transparent',color:'#333',fontFamily:'inherit'}}
            value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
          {searchTerm&&<button onClick={()=>setSearchTerm('')} style={{background:'none',border:'none',cursor:'pointer',color:'#CCC',fontSize:18,lineHeight:1}}>×</button>}
        </div>
      </div>

      {/* 件数・クリア */}
      <div style={{padding:'4px 14px 8px',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <span style={{fontSize:13,color:'#888'}}><span style={{fontSize:20,fontWeight:900,color:'#F97316'}}>{filtered.length}</span> 件</span>
        {activeCount>0&&<button onClick={reset} style={{fontSize:11,color:'#F97316',background:'#FFF7ED',border:'1px solid #FDBA74',borderRadius:20,padding:'3px 10px',cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}>条件クリア ×</button>}
        {filterGrade&&<span style={{fontSize:11,padding:'2px 8px',borderRadius:99,fontWeight:700,background:GRADE_COLORS[filterGrade]?.bg||'#F5F5F5',color:GRADE_COLORS[filterGrade]?.text||'#555',border:`1px solid ${GRADE_COLORS[filterGrade]?.border||'#DDD'}`}}>{filterGrade}</span>}
        {filterArea&&<span style={{fontSize:11,padding:'2px 8px',borderRadius:99,fontWeight:700,background:'#FFF7ED',color:'#F97316',border:'1px solid #FDBA74'}}>📍{filterArea.length>8?filterArea.slice(0,8)+'…':filterArea}</span>}
      </div>

      {/* 一覧上部CTA */}
      <div style={{padding:'0 12px 10px'}}>
        <a href={FORM_URL} target="_blank" rel="noopener noreferrer"
          style={{display:'block',padding:'12px',background:'#fff',border:'2px dashed #FDBA74',borderRadius:12,textAlign:'center',textDecoration:'none',fontSize:13,fontWeight:800,color:'#F97316'}}
          onClick={()=>window.gtag&&window.gtag('event','cta_click',{location:'list_top'})}>
          📋 あなたの教室を無料掲載しませんか？
        </a>
      </div>

      {/* カード一覧 */}
      <main style={{padding:'0 12px',display:'flex',flexDirection:'column',gap:10}}>
        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'56px 24px',color:'#CCC'}}>
            <div style={{fontSize:44,marginBottom:10}}>🔎</div>
            <div style={{fontSize:15,fontWeight:700,color:'#888',marginBottom:4}}>条件に合う塾が見つかりませんでした</div>
            <div style={{fontSize:12}}>フィルターを変えてみてください</div>
          </div>
        ):filtered.map((juku,idx)=>(
          <React.Fragment key={juku.slug||juku.no}>
            <div className={`card${juku.featured?' feat':''}`}>
              {juku.featured&&<div style={{background:'linear-gradient(90deg,#FBBF24,#F59E0B)',color:'#78350F',fontSize:11,fontWeight:900,padding:'4px 14px'}}>★ おすすめ教室</div>}
              <div style={{padding:'12px 14px'}}>
                <h2 style={{fontSize:15,fontWeight:800,color:'#F97316',marginBottom:8,lineHeight:1.35}}>{juku.name}</h2>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 8px',marginBottom:8}}>
                  {juku.area&&<div style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'#666'}}>📍 {juku.area}</div>}
                  {juku.parking&&<div style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'#666'}}>🚗 駐車場: {juku.parking}</div>}
                  {juku.type&&<div style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'#666'}}>📖 {juku.type}</div>}
                  {juku.grade&&(
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {juku.grade.split(/[・,、]/).map(g=>g.trim()).filter(Boolean).map(g=>(
                        <span key={g} style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:5,background:GRADE_COLORS[g]?.bg||'#F5F5F5',color:GRADE_COLORS[g]?.text||'#555',border:`1px solid ${GRADE_COLORS[g]?.border||'#DDD'}`}}>{g}</span>
                      ))}
                    </div>
                  )}
                  {juku.price&&<div style={{fontSize:12,color:'#16A34A',fontWeight:700}}>💴 {juku.price}</div>}
                  {juku.trial==='あり'&&<div style={{fontSize:11,background:'#ECFDF5',color:'#065F46',border:'1px solid #6EE7B7',borderRadius:6,padding:'2px 8px',fontWeight:700,display:'inline-flex',alignItems:'center',gap:3}}>✓ 体験あり</div>}
                </div>
                {juku.memo&&<p style={{fontSize:12,color:'#888',borderLeft:'3px solid #FBBF24',paddingLeft:8,marginBottom:juku.access?8:10,lineHeight:1.5}}>{juku.memo}</p>}
                {juku.access&&<p style={{fontSize:11,color:'#BBB',marginBottom:10}}>🚶 {juku.access}</p>}
                {juku.url&&<button className="site-btn"
                  onClick={()=>{ if(window.gtag)window.gtag('event','juku_click',{juku_name:juku.name,juku_slug:juku.slug,juku_area:juku.area}); window.open(juku.url,'_blank','noopener,noreferrer'); }}>
                  公式サイトを見る ↗
                </button>}
              </div>
            </div>
            {/* 中間CTA（10件目の後） */}
            {idx===9&&(
              <a href={FORM_URL} target="_blank" rel="noopener noreferrer"
                style={{display:'block',padding:'14px 16px',background:'linear-gradient(135deg,#F97316,#FBBF24)',borderRadius:14,textAlign:'center',textDecoration:'none',fontSize:14,fontWeight:900,color:'#fff',boxShadow:'0 4px 14px rgba(249,115,22,0.3)'}}
                onClick={()=>window.gtag&&window.gtag('event','cta_click',{location:'list_middle'})}>
                📋 無料掲載はこちら
              </a>
            )}
          </React.Fragment>
        ))}
      </main>

      {/* FAB */}
      <button className="fab" onClick={()=>setModalOpen(true)} aria-label="絞り込み">
        <span style={{fontSize:24}}>🔍</span>
        {activeCount>0&&<div style={{position:'absolute',top:0,right:0,background:'#EF4444',color:'#fff',borderRadius:99,fontSize:10,fontWeight:900,minWidth:18,height:18,padding:'0 4px',display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid #fff'}}>{activeCount}</div>}
      </button>

      <div style={{padding:'24px 16px 100px',textAlign:'center',display:'flex',flexDirection:'column',gap:10,alignItems:'center'}}>
        <button onClick={()=>onNav('for-owners')} className="nav-link">📋 掲載希望の方はこちら</button>
        <button onClick={()=>onNav('about')} className="nav-link">📄 このサイトについて</button>
      </div>

      {/* 絞り込みモーダル */}
      {modalOpen&&(
        <div onClick={()=>setModalOpen(false)} style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,0.42)',backdropFilter:'blur(3px)',display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:'22px 22px 0 0',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 -8px 40px rgba(0,0,0,0.2)'}}>
            <div style={{display:'flex',justifyContent:'center',paddingTop:12}}><div style={{width:44,height:4,borderRadius:99,background:'#DDD'}}/></div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 20px 12px',borderBottom:'1px solid #F0EDE6'}}>
              <span style={{fontWeight:900,fontSize:17,color:'#222'}}>絞り込み</span>
              <button onClick={()=>setModalOpen(false)} style={{background:'#F5F3EE',border:'none',borderRadius:'50%',width:34,height:34,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#666'}}>×</button>
            </div>
            <div style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:20}}>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:'#AAA',letterSpacing:1.5,marginBottom:8}}>📍 エリア</div>
                <select value={filterArea} onChange={e=>setFilterArea(e.target.value)} style={{width:'100%',padding:'12px 14px',border:'1.5px solid #E8E4DC',borderRadius:12,fontSize:15,fontFamily:'inherit',background:'#FAFAF8',outline:'none',color:'#333'}}>
                  <option value="">すべてのエリア</option>
                  {areas.map(a=><option key={a} value={a}>{a}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:'#AAA',letterSpacing:1.5,marginBottom:8}}>📚 対象学年</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {['小','中','高','大'].map(g=>(
                    <button key={g} className="chip" onClick={()=>setFilterGrade(filterGrade===g?'':g)}
                      style={{border:`2px solid ${filterGrade===g?GRADE_COLORS[g].text:'#E8E4DC'}`,background:filterGrade===g?GRADE_COLORS[g].text:'#F7F5F1',color:filterGrade===g?'#fff':'#555'}}>
                      {g}学生
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:'#AAA',letterSpacing:1.5,marginBottom:8}}>⚙️ オプション</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {[{label:'✅ 体験授業あり',active:filterTrial,onClick:()=>setFilterTrial(v=>!v),color:'#16A34A'},{label:'🅿️ 駐車場あり',active:filterParking,onClick:()=>setFilterParking(v=>!v),color:'#2563EB'}].map(opt=>(
                    <button key={opt.label} className="chip" onClick={opt.onClick}
                      style={{border:`2px solid ${opt.active?opt.color:'#E8E4DC'}`,background:opt.active?opt.color:'#F7F5F1',color:opt.active?'#fff':'#555'}}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <div style={{padding:'12px 20px 28px',display:'flex',gap:10,borderTop:'1px solid #F0EDE6'}}>
              <button onClick={reset} style={{flex:1,height:52,borderRadius:14,border:'2px solid #E8E4DC',background:'#fff',fontSize:14,fontWeight:700,color:'#999',cursor:'pointer',fontFamily:'inherit'}}>リセット</button>
              <button onClick={()=>setModalOpen(false)} style={{flex:2,height:52,borderRadius:14,border:'none',background:'linear-gradient(135deg,#F97316,#FBBF24)',fontSize:15,fontWeight:900,color:'#fff',cursor:'pointer',fontFamily:'inherit',boxShadow:'0 4px 14px rgba(249,115,22,0.4)'}}>
                {filtered.length}件を表示 ›
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── アプリ本体 ───────────────────────────────────────────
function App(){
  const [page,setPage]=useState('home');
  // フィルター状態をApp側で管理（ページ遷移しても保持される）
  const [filters,setFilters]=useState({searchTerm:'',filterArea:'',filterGrade:'',filterTrial:false,filterParking:false});
  const onNav=(p)=>{
    setPage(p);
    window.scrollTo(0,0);
    if(window.gtag){
      const paths={'home':'/','about':'/about','for-owners':'/for-owners'};
      window.gtag('event','page_view',{page_path:paths[p]||'/'+p});
    }
  };
  if(page==='about') return <AboutPage onNav={onNav}/>;
  if(page==='for-owners') return <ForOwnersPage onNav={onNav}/>;
  return <HomePage onNav={onNav} filters={filters} setFilters={setFilters}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
